<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="description" content="This site is undergoing revision. Check back soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet" />
  <title>Okal — Under revision</title>
  <style>
    :root {
      --bg: #0f1114;
      --fg: #e8eaed;
      --muted: #9aa3ad;
      --accent: #7c9cbf;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Source Sans 3", system-ui, -apple-system, sans-serif;
      font-weight: 400;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      line-height: 1.6;
    }

    main {
      max-width: 32rem;
      text-align: center;
    }

    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2rem, 6vw, 2.75rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0 0 0.75rem;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .status {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(124, 156, 191, 0.35);
      background: rgba(124, 156, 191, 0.08);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
    }

    a:hover {
      border-bottom-color: var(--accent);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>This site is undergoing revision.</h1>
    <p>Thanks for stopping by. A refreshed version will be here before long.</p>
    <span class="status">Work in progress</span>
    <footer>
      <a href="mailto:careyokal@gmail.com">careyokal@gmail.com</a>
    </footer>
  </main>
</body>
</html>
